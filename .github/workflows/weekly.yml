name: Weekly Sport Reading

on:
  schedule:
    # GitHub cron is UTC only (no daylight-saving handling).
    # 13:00 UTC = 7:00am Mountain Daylight Time (summer) / 6:00am MST (winter).
    - cron: "0 13 * * 1"
  workflow_dispatch:        # lets you trigger a test run manually from the Actions tab

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install anthropic

      - run: python main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          # Optional overrides:
          # SMTP_HOST: smtp.gmail.com
          # SMTP_PORT: "587"
          # FROM_ADDR: you@example.com
          # MODEL: claude-haiku-4-5-20251001
